<div class="pv-header">
  <span class="pv-title">摘要记忆</span>
  <div class="pv-controls">
    <button id="btn-edit-summary" class="btn btn-secondary btn-sm" onclick="toggleSummaryEdit()">
      <i data-lucide="pencil"></i> 编辑
    </button>
    <button class="btn btn-ghost btn-sm btn-icon" onclick="initSummaryPanel()" title="刷新">
      <i data-lucide="refresh-cw"></i>
    </button>
  </div>
</div>
<div class="pv-body">
  <div class="summary-layout">
    <div id="summary-list"><div class="placeholder">加载中…</div></div>
    <div id="summary-area">
      <div id="summary-content"><div class="placeholder">← 从列表选择摘要</div></div>
      <div id="summary-editor">
        <textarea id="summary-textarea" placeholder="Markdown 内容…"></textarea>
        <div class="editor-actions">
          <button class="btn btn-secondary" onclick="cancelSummaryEdit()">取消</button>
          <button class="btn btn-primary" onclick="saveSummary()">
            <i data-lucide="save"></i> 保存
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
