<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enhanced Memory</title>
<!-- CSS -->
<link rel="stylesheet" href="/static/css/variables.css">
<link rel="stylesheet" href="/static/css/layout.css">
<link rel="stylesheet" href="/static/css/components.css">
<link rel="stylesheet" href="/static/css/timeline.css">
<link rel="stylesheet" href="/static/css/graph.css">
<link rel="stylesheet" href="/static/css/summary.css">
<link rel="stylesheet" href="/static/css/recall.css">
<link rel="stylesheet" href="/static/css/settings.css">
<link rel="stylesheet" href="/static/css/landing.css">
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-card">
    <h2 id="login-title">Enhanced Memory</h2>
    <div class="sub" id="login-sub">三轴长期记忆面板</div>
    <input type="password" id="login-pw"  placeholder="管理密码"  autocomplete="current-password">
    <input type="password" id="login-pw2" placeholder="再次输入"  autocomplete="new-password" style="display:none">
    <button id="login-btn">登录</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- Main app -->
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sb-logo" id="sb-logo-btn">
      <div class="sb-logo-title">
        Enhanced Memory
        <span class="badge">v<span id="app-version-badge">…</span></span>
      </div>
      <div class="sb-logo-sub">三轴长期记忆面板</div>
    </div>

    <nav class="sb-nav">
      <div class="sb-group-label">可视化</div>
      <button class="nav-item" data-panel="events" onclick="switchPanel('events',this)">
        <i data-lucide="activity" class="nav-icon"></i>事件流
      </button>
      <button class="nav-item" data-panel="graph" onclick="switchPanel('graph',this)">
        <i data-lucide="share-2" class="nav-icon"></i>关系图
      </button>
      <button class="nav-item" data-panel="summary" onclick="switchPanel('summary',this)">
        <i data-lucide="book-open" class="nav-icon"></i>摘要记忆
      </button>

      <div class="sb-separator"></div>

      <div class="sb-group-label">工具</div>
      <button class="nav-item" data-panel="recall" onclick="switchPanel('recall',this)">
        <i data-lucide="search" class="nav-icon"></i>记忆召回
      </button>

      <div class="sb-separator"></div>

      <div class="sb-group-label">管理</div>
      <button class="nav-item" data-panel="settings" onclick="switchPanel('settings',this)">
        <i data-lucide="settings" class="nav-icon"></i>设置
      </button>
    </nav>

    <div class="sb-footer">
      <div class="sb-stats">
        <span class="sb-stat" id="stat-personas">人格 0</span>
        <span class="sb-stat" id="stat-events">事件 0</span>
        <span class="sb-stat" id="stat-impressions">印象 0</span>
      </div>
      <div class="sb-actions">
        <button id="btn-sudo" onclick="toggleSudo()" title="Sudo 模式">
          <i data-lucide="lock" class="icon-btn-svg"></i> Sudo
        </button>
        <button onclick="toggleTheme()" title="切换主题">
          <i data-lucide="moon-star" class="icon-btn-svg"></i>
        </button>
        <button onclick="logout()" title="退出登录">
          <i data-lucide="log-out" class="icon-btn-svg"></i>
        </button>
      </div>
      <div class="sb-version">Enhanced Memory v<span id="app-version-sb">…</span></div>
    </div>
  </aside>

  <!-- Main content — panels are empty shells, content is fetched from /static/pages/*.html -->
  <main id="main-content">
    <div class="panel-view" id="panel-landing"></div>
    <div class="panel-view" id="panel-events"></div>
    <div class="panel-view" id="panel-graph"></div>
    <div class="panel-view" id="panel-summary"></div>
    <div class="panel-view" id="panel-recall"></div>
    <div class="panel-view" id="panel-settings"></div>
  </main>

</div>

<!-- Global floating detail panel -->
<div id="detail-panel">
  <button class="detail-close" onclick="hideDetail()">
    <i data-lucide="x" style="width:14px;height:14px;stroke-width:2.5"></i>
  </button>
  <div id="detail-content"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modals container (populated by /static/components/modals.html on boot) -->
<div id="modals-container"></div>

<!-- CDN libraries -->
<script src="https://unpkg.com/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/marked@9.1.6/marked.min.js"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>

<!-- App modules — order matters (dependencies first) -->
<script src="/static/js/state.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/timeline.js"></script>
<script src="/static/js/graph.js"></script>
<script src="/static/js/summary.js"></script>
<script src="/static/js/recall.js"></script>
<script src="/static/js/settings.js"></script>
<script src="/static/js/app.js"></script>

</body>
</html>
