<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enhanced Memory</title>
<style>
:root {
  --bg: #0f172a;
  --bg-2: #1e293b;
  --panel: rgba(30, 41, 59, 0.92);
  --panel-border: rgba(255, 255, 255, 0.08);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --accent: #38bdf8;
  --accent-hover: #0ea5e9;
  --positive: #22c55e;
  --negative: #ef4444;
  --warn: #f59e0b;
  --tl-accent: #ef4444;
  --sidebar-w: 220px;
}
[data-theme="light"] {
  --bg: #f1f5f9;
  --bg-2: #e2e8f0;
  --panel: rgba(255, 255, 255, 0.92);
  --panel-border: rgba(0, 0, 0, 0.08);
  --text: #0f172a;
  --text-dim: #64748b;
  --accent: #0ea5e9;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, "Outfit", BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ============================================================
   登录覆盖层
   ============================================================ */
#login-overlay {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
}
.login-card {
  width: 360px; padding: 32px;
  background: var(--panel); backdrop-filter: blur(20px);
  border: 1px solid var(--panel-border); border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.login-card h2 { font-size: 18px; margin-bottom: 4px; }
.login-card .sub { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; }
.login-card input {
  width: 100%; padding: 10px 12px; margin-bottom: 12px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border);
  border-radius: 8px; color: var(--text); font-size: 13px;
}
.login-card input:focus { outline: none; border-color: var(--accent); }
.login-card button {
  width: 100%; padding: 10px;
  background: var(--accent); color: #fff; border: none; border-radius: 8px;
  font-weight: 600; cursor: pointer; transition: background 0.15s;
}
.login-card button:hover { background: var(--accent-hover); }
.login-card .err { color: var(--negative); font-size: 12px; margin-top: 8px; min-height: 16px; }

/* ============================================================
   主布局
   ============================================================ */
#app { display: none; height: 100vh; }
#app.ready { display: flex; }

/* ============================================================
   侧边栏
   ============================================================ */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--bg-2); border-right: 1px solid var(--panel-border);
  display: flex; flex-direction: column;
  height: 100vh;
}
.sb-logo {
  padding: 16px 14px 12px;
  border-bottom: 1px solid var(--panel-border);
}
.sb-logo-title { font-size: 13px; font-weight: 700; letter-spacing: 0.2px; }
.sb-logo-title .badge {
  display: inline-block; font-size: 9px;
  background: var(--accent); color: #fff;
  padding: 1px 5px; border-radius: 6px; margin-left: 5px;
}
.sb-logo-sub { font-size: 10px; color: var(--text-dim); margin-top: 3px; }

.sb-nav {
  flex: 1; padding: 10px 8px;
  display: flex; flex-direction: column; gap: 2px;
  overflow-y: auto;
}
.nav-item {
  width: 100%; padding: 9px 12px;
  background: transparent; border: none; color: var(--text-dim);
  border-radius: 8px; text-align: left; font-size: 13px;
  cursor: pointer; transition: background 0.15s, color 0.15s;
  display: flex; align-items: center; gap: 8px;
}
.nav-item:hover { background: rgba(255,255,255,0.07); color: var(--text); }
.nav-item.active { background: rgba(56,189,248,0.15); color: var(--accent); font-weight: 600; }
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; stroke-width: 2; }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; stroke-width: 2; }

/* 侧边栏分组（shadcn 风格） */
.sb-group-label {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.7px;
  color: var(--text-dim);
  padding: 8px 12px 4px;
}
.sb-separator {
  height: 1px;
  background: var(--panel-border);
  margin: 8px 6px;
}

/* 全局图标对齐 */
.icon-btn-svg {
  width: 14px; height: 14px;
  stroke-width: 2;
  vertical-align: middle;
  display: inline-block;
}
.detail-title-icon {
  width: 14px; height: 14px;
  stroke-width: 2;
  vertical-align: -2px;
  margin-right: 4px;
}

.sb-footer {
  padding: 10px 10px 12px;
  border-top: 1px solid var(--panel-border);
  display: flex; flex-direction: column; gap: 8px;
}
.sb-stats { display: flex; flex-direction: column; gap: 2px; }
.sb-stat { font-size: 11px; color: var(--text-dim); padding: 1px 4px; }
.sb-actions { display: flex; gap: 4px; flex-wrap: wrap; }
.sb-actions button {
  font-size: 11px; padding: 4px 7px;
  background: rgba(255,255,255,0.06); color: var(--text);
  border: 1px solid var(--panel-border); border-radius: 6px;
  cursor: pointer; transition: background 0.15s;
}
.sb-actions button:hover { background: rgba(255,255,255,0.13); }
.sb-actions button.sudo-active { background: var(--warn); color: #000; border-color: var(--warn); }
.sb-version { font-size: 10px; color: var(--text-dim); padding: 0 4px; }

/* ============================================================
   主内容区
   ============================================================ */
#main-content { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }

.panel-view { display: none; flex: 1; flex-direction: column; min-height: 0; }
.panel-view.active { display: flex; }

.pv-header {
  padding: 10px 18px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--panel-border);
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}
.pv-title { font-size: 14px; font-weight: 600; flex: 1; }
.pv-controls { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); }
.pv-controls input[type="range"] { width: 80px; accent-color: var(--accent); }
.pv-controls button {
  font-size: 11px; padding: 3px 9px;
  background: rgba(255,255,255,0.07); color: var(--text);
  border: 1px solid var(--panel-border); border-radius: 5px;
  cursor: pointer; transition: background 0.15s;
}
.pv-controls button:hover { background: rgba(255,255,255,0.14); }

.pv-body { flex: 1; min-height: 0; position: relative; overflow: hidden; }

/* ============================================================
   自定义时间线
   ============================================================ */
#tl-scroll {
  position: absolute; inset: 0;
  overflow-y: auto; overflow-x: hidden;
}
#tl-container {
  position: relative;
  padding: 36px 0 64px;
  min-height: 100%;
}

/* 中心红线 */
#tl-container::before {
  content: '';
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 2px;
  background: var(--tl-accent);
  transform: translateX(-50%);
  opacity: 0.65;
}

.tl-item {
  display: flex;
  width: 100%;
  padding-bottom: 28px;
  position: relative;
  align-items: flex-start;
}
.tl-item.left {
  padding-right: calc(50% + 34px);
  padding-left: 20px;
  justify-content: flex-end;
}
.tl-item.right {
  padding-left: calc(50% + 34px);
  padding-right: 20px;
  justify-content: flex-start;
}

.tl-dot {
  position: absolute;
  left: calc(50% - 8px);
  top: 14px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--tl-accent);
  border: 2px solid var(--bg);
  z-index: 4;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s;
}
.tl-dot:hover, .tl-dot.highlighted {
  transform: scale(1.5);
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--tl-accent) 30%, transparent);
}
.tl-dot.has-parent { background: #f97316; border-color: var(--bg); }
.tl-dot.has-parent.highlighted { box-shadow: 0 0 0 4px rgba(249,115,22,0.35); }

.tl-card {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  width: 100%;
  transition: box-shadow 0.18s, border-color 0.18s;
}
.tl-card:hover {
  box-shadow: 0 4px 20px color-mix(in srgb, var(--tl-accent) 18%, transparent);
  border-color: color-mix(in srgb, var(--tl-accent) 30%, transparent);
}
.tl-card.highlighted { border-color: var(--warn); box-shadow: 0 4px 20px rgba(245,158,11,0.28); }

.tl-card-header {
  padding: 9px 13px;
  background: linear-gradient(135deg,
    color-mix(in srgb, var(--tl-accent) 22%, transparent) 0%,
    color-mix(in srgb, var(--tl-accent) 6%, transparent) 100%);
  border-bottom: 1px solid color-mix(in srgb, var(--tl-accent) 14%, transparent);
}
.tl-card-title { font-size: 13px; font-weight: 600; }
.tl-card-time { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.tl-card-body {
  padding: 7px 13px;
  display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
}
.tl-badge {
  display: inline-flex; align-items: center;
  font-size: 10px; padding: 2px 7px; border-radius: 8px;
}
.tl-badge.salience { background: rgba(56,189,248,0.14); color: var(--accent); }
.tl-badge.group { background: rgba(255,255,255,0.07); color: var(--text-dim); }
.tl-badge.tag { background: rgba(34,197,94,0.12); color: var(--positive); }
.tl-badge.participants { background: rgba(168,85,247,0.12); color: #a855f7; }

/* 继承关系桥接线 */
.tl-bridge {
  position: absolute;
  left: calc(50% - 1px);
  width: 2px; z-index: 3;
  cursor: pointer;
}
/* wider hit area */
.tl-bridge::before {
  content: ''; position: absolute;
  left: -8px; right: -8px; top: 0; bottom: 0;
}
.tl-bridge::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 4px,
    #f97316 4px, #f97316 8px
  );
  opacity: 0; transition: opacity 0.2s;
}
.tl-bridge:hover::after { opacity: 1; }

.tl-empty {
  text-align: center; color: var(--text-dim);
  padding: 80px 20px; font-size: 13px; line-height: 1.7;
}

/* Cytoscape */
#cy { position: absolute; inset: 0; }

/* ============================================================
   摘要面板
   ============================================================ */
.summary-layout { position: absolute; inset: 0; display: flex; }
#summary-list {
  width: 196px; flex-shrink: 0; overflow-y: auto;
  border-right: 1px solid var(--panel-border);
}
.s-item {
  padding: 9px 13px; cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.1s;
}
.s-item:hover { background: rgba(56,189,248,0.08); }
.s-item.active { background: rgba(56,189,248,0.13); border-left-color: var(--accent); }
.s-group { font-size: 12px; font-weight: 600; }
.s-date { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

#summary-area {
  flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden;
}
#summary-content {
  flex: 1; overflow-y: auto;
  padding: 18px 22px;
  font-size: 13px; line-height: 1.75;
}
#summary-content h1 { font-size: 16px; margin: 14px 0 6px; }
#summary-content h2 { font-size: 14px; margin: 12px 0 4px; }
#summary-content h3 { font-size: 13px; margin: 10px 0 3px; }
#summary-content ul, #summary-content ol { padding-left: 20px; margin: 5px 0; }
#summary-content p { margin: 5px 0; }
#summary-content code {
  background: rgba(0,0,0,0.22); padding: 1px 5px; border-radius: 3px;
  font-family: ui-monospace, monospace; font-size: 11px;
}
#summary-content blockquote {
  border-left: 3px solid var(--accent); padding-left: 12px;
  color: var(--text-dim); margin: 8px 0;
}
#summary-editor {
  flex: 1; min-height: 0; display: none; flex-direction: column; padding: 12px; gap: 8px;
}
#summary-textarea {
  flex: 1; min-height: 0;
  background: rgba(0,0,0,0.18); border: 1px solid var(--panel-border);
  border-radius: 8px; color: var(--text); font-size: 13px; line-height: 1.6;
  padding: 12px; resize: none;
  font-family: ui-monospace, "Cascadia Code", monospace;
}
#summary-textarea:focus { outline: none; border-color: var(--accent); }
.editor-actions { display: flex; gap: 8px; justify-content: flex-end; }
.editor-actions button {
  padding: 6px 16px; border-radius: 6px; font-size: 12px;
  cursor: pointer; border: none;
}
.btn-save { background: var(--accent); color: #fff; }
.btn-save:hover { background: var(--accent-hover); }
.btn-cancel {
  background: rgba(255,255,255,0.08); color: var(--text);
  border: 1px solid var(--panel-border) !important;
}

/* ============================================================
   详情浮层
   ============================================================ */
#detail-panel {
  position: fixed; top: 56px; right: 14px;
  width: 296px; max-height: calc(100vh - 76px);
  background: var(--panel); backdrop-filter: blur(20px);
  border: 1px solid var(--panel-border); border-radius: 10px;
  padding: 14px 16px; overflow-y: auto;
  display: none; z-index: 100;
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  animation: slideIn 0.18s ease-out;
}
@keyframes slideIn {
  from { transform: translateX(16px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}
#detail-panel.show { display: block; }
#detail-panel h3 { font-size: 13px; margin-bottom: 8px; }
.detail-close {
  position: absolute; top: 8px; right: 11px;
  background: none; border: none; color: var(--text-dim);
  font-size: 18px; cursor: pointer;
}
.detail-field {
  font-size: 11px; margin: 6px 0;
  display: flex; justify-content: space-between; gap: 10px;
}
.detail-field .k { color: var(--text-dim); flex-shrink: 0; }
.detail-field .v { font-family: ui-monospace, monospace; word-break: break-all; text-align: right; }
.detail-tag {
  display: inline-block; font-size: 10px;
  background: rgba(56,189,248,0.18); color: var(--accent);
  padding: 1px 6px; border-radius: 8px; margin: 1px 2px;
}

/* ============================================================
   Toast
   ============================================================ */
#toast {
  position: fixed; bottom: 22px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg-2); color: var(--text);
  padding: 10px 18px; border-radius: 8px;
  border: 1px solid var(--panel-border);
  font-size: 13px; display: none; z-index: 500;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  white-space: nowrap;
}

/* ============================================================
   设置面板（独立 panel-view）
   ============================================================ */
.settings-section {
  max-width: 720px; margin-bottom: 24px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 10px;
  padding: 16px 18px;
}
.settings-section h4 {
  font-size: 11px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.7px;
  margin-bottom: 12px; font-weight: 600;
}
.settings-row {
  display: flex; gap: 8px; align-items: center;
  margin: 6px 0; font-size: 12px;
}
.settings-row label { flex: 1; }
.settings-row input[type="password"], .settings-row input[type="text"] {
  background: rgba(0,0,0,0.22); border: 1px solid var(--panel-border);
  border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 12px;
  flex: 0 0 140px;
}
.settings-row input:focus { outline: none; border-color: var(--accent); }
.settings-btn {
  background: var(--accent); color: #fff; border: none;
  padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 5px;
  transition: opacity 0.15s;
}
.settings-btn:hover { opacity: 0.88; }
.task-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0; font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.task-row:last-child { border-bottom: none; }
.task-row > span { display: inline-flex; align-items: center; gap: 6px; }

.placeholder {
  color: var(--text-dim); text-align: center;
  padding: 40px 14px; font-size: 12px; line-height: 1.6;
}
.error { color: var(--negative); }
</style>
</head>
<body>

<!-- 登录覆盖层 -->
<div id="login-overlay">
  <div class="login-card">
    <h2 id="login-title">Enhanced Memory</h2>
    <div class="sub" id="login-sub">三轴记忆面板</div>
    <input type="password" id="login-pw" placeholder="管理密码" autocomplete="current-password">
    <input type="password" id="login-pw2" placeholder="再次输入" autocomplete="new-password" style="display:none">
    <button id="login-btn">登录</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- 主应用 -->
<div id="app">

  <!-- 侧边栏 -->
  <aside id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-title">
        Enhanced Memory
        <span class="badge">v<span id="app-version">…</span></span>
      </div>
      <div class="sb-logo-sub">三轴长期记忆面板</div>
    </div>

    <nav class="sb-nav">
      <div class="sb-group-label">可视化</div>
      <button class="nav-item active" data-panel="events" onclick="switchPanel('events',this)">
        <i data-lucide="activity" class="nav-icon"></i>事件流
      </button>
      <button class="nav-item" data-panel="graph" onclick="switchPanel('graph',this)">
        <i data-lucide="share-2" class="nav-icon"></i>关系图
      </button>
      <button class="nav-item" data-panel="summary" onclick="switchPanel('summary',this)">
        <i data-lucide="book-open" class="nav-icon"></i>摘要记忆
      </button>

      <div class="sb-separator"></div>

      <div class="sb-group-label">管理</div>
      <button class="nav-item" data-panel="settings" onclick="switchPanel('settings',this)">
        <i data-lucide="settings" class="nav-icon"></i>设置
      </button>
    </nav>

    <div class="sb-footer">
      <div class="sb-stats">
        <span class="sb-stat" id="stat-personas">人格 0</span>
        <span class="sb-stat" id="stat-events">事件 0</span>
        <span class="sb-stat" id="stat-impressions">印象 0</span>
      </div>
      <div class="sb-actions">
        <button id="btn-sudo" onclick="toggleSudo()" title="Sudo 模式">
          <i data-lucide="lock" class="icon-btn-svg"></i> Sudo
        </button>
        <button onclick="toggleTheme()" title="切换主题">
          <i data-lucide="moon-star" class="icon-btn-svg"></i>
        </button>
        <button onclick="logout()" title="退出登录">
          <i data-lucide="log-out" class="icon-btn-svg"></i>
        </button>
      </div>
      <div class="sb-version">Enhanced Memory v<span id="app-version-sb">…</span></div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main id="main-content">

    <!-- 面板：事件流 -->
    <div class="panel-view active" id="panel-events">
      <div class="pv-header">
        <span class="pv-title">事件流（Event Flow）</span>
        <span class="pv-controls">
          <span>密度</span>
          <input type="range" id="event-density" min="20" max="500" value="200" step="10">
          <span id="event-density-label">200</span>
          <button onclick="reloadEventFlow()">刷新</button>
        </span>
      </div>
      <div class="pv-body">
        <div id="tl-scroll">
          <div id="tl-container">
            <div class="tl-empty">加载中…</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 面板：关系图 -->
    <div class="panel-view" id="panel-graph">
      <div class="pv-header">
        <span class="pv-title">关系图（Relation Graph）</span>
        <span class="pv-controls">
          <button id="btn-fit">适配</button>
          <button id="btn-refresh-graph">刷新</button>
        </span>
      </div>
      <div class="pv-body"><div id="cy"></div></div>
    </div>

    <!-- 面板：设置 -->
    <div class="panel-view" id="panel-settings">
      <div class="pv-header">
        <span class="pv-title">设置与管理</span>
      </div>
      <div class="pv-body" style="overflow-y:auto;padding:18px 24px">
        <div class="settings-section">
          <h4>认证</h4>
          <div class="settings-row">
            <label>当前会话</label>
            <span id="auth-status-line" style="font-size:11px;color:var(--text-dim)">…</span>
          </div>
          <div class="settings-row">
            <label>修改密码（旧 / 新）</label>
            <input type="password" id="pw-old" placeholder="旧密码">
            <input type="password" id="pw-new" placeholder="新密码">
            <button class="settings-btn" onclick="changePassword()">
              <i data-lucide="check" class="icon-btn-svg"></i> 保存
            </button>
          </div>
        </div>

        <div class="settings-section">
          <h4>触发后台任务（需 Sudo）</h4>
          <div class="task-row">
            <span><i data-lucide="trending-down" class="icon-btn-svg"></i> 显著度衰减</span>
            <button class="settings-btn" onclick="runTask('salience_decay')">运行</button>
          </div>
          <div class="task-row">
            <span><i data-lucide="file-down" class="icon-btn-svg"></i> Markdown 投影</span>
            <button class="settings-btn" onclick="runTask('projection')">运行</button>
          </div>
          <div class="task-row">
            <span><i data-lucide="user-cog" class="icon-btn-svg"></i> 人格画像合成</span>
            <button class="settings-btn" onclick="runTask('persona_synthesis')">运行</button>
          </div>
          <div class="task-row">
            <span><i data-lucide="users" class="icon-btn-svg"></i> 印象聚合</span>
            <button class="settings-btn" onclick="runTask('impression_aggregation')">运行</button>
          </div>
          <div class="task-row">
            <span><i data-lucide="layout-list" class="icon-btn-svg"></i> 群组摘要</span>
            <button class="settings-btn" onclick="runTask('group_summary')">运行</button>
          </div>
        </div>

        <div class="settings-section">
          <h4>演示数据</h4>
          <div class="settings-row">
            <label>注入模拟数据以预览界面效果（需 Sudo）</label>
            <button class="settings-btn" onclick="injectDemo()">
              <i data-lucide="sparkles" class="icon-btn-svg"></i> 注入
            </button>
          </div>
        </div>

        <div class="settings-section">
          <h4>已注册第三方面板</h4>
          <div id="ext-panels-list" style="font-size:11px;color:var(--text-dim)">加载中…</div>
        </div>
      </div>
    </div>

    <!-- 面板：摘要记忆 -->
    <div class="panel-view" id="panel-summary">
      <div class="pv-header">
        <span class="pv-title">摘要记忆（Summarised Memory）</span>
        <span class="pv-controls">
          <button id="btn-edit-summary" onclick="toggleSummaryEdit()">编辑</button>
        </span>
      </div>
      <div class="pv-body">
        <div class="summary-layout">
          <div id="summary-list"><div class="placeholder">加载中…</div></div>
          <div id="summary-area">
            <div id="summary-content"><div class="placeholder">← 从列表选择摘要</div></div>
            <div id="summary-editor">
              <textarea id="summary-textarea" placeholder="Markdown 内容…"></textarea>
              <div class="editor-actions">
                <button class="btn-cancel" onclick="cancelSummaryEdit()">取消</button>
                <button class="btn-save" onclick="saveSummary()">保存</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- 详情浮层 -->
<div id="detail-panel">
  <button class="detail-close" onclick="hideDetail()">×</button>
  <div id="detail-content"></div>
</div>

<!-- Toast -->
<div id="toast"></div>


<script src="https://unpkg.com/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/marked@9.1.6/marked.min.js"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>

<script>
'use strict';

// ============================================================================
// State
// ============================================================================
const State = {
  authEnabled: true,
  authenticated: false,
  sudo: false,
  passwordSet: false,
  cy: null,
  rawGraph: { nodes: [], edges: [] },
  rawEvents: [],
  currentSummary: { groupId: null, date: null, content: '' },
  summaryEditing: false,
  currentPanel: 'events',
};

const $ = sel => document.querySelector(sel);
const fetchJson = async (url, opts = {}) => {
  const res = await fetch(url, {
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) {
    const raw = await res.text();
    let detail = raw;
    try { const j = JSON.parse(raw); detail = j.error || raw; } catch {}
    throw { status: res.status, body: detail, raw };
  }
  return res.json();
};

// 渲染所有 lucide 图标（动态插入 DOM 后需重新调用）
function renderIcons() {
  if (window.lucide) window.lucide.createIcons();
}

// ============================================================================
// Panel switching
// ============================================================================
function switchPanel(name, btnEl) {
  if (State.currentPanel === name) return;
  State.currentPanel = name;

  document.querySelectorAll('.panel-view').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));

  const panel = document.getElementById('panel-' + name);
  if (panel) panel.classList.add('active');

  const btn = btnEl || document.querySelector(`.nav-item[data-panel="${name}"]`);
  if (btn) btn.classList.add('active');

  if (name === 'graph' && State.cy) setTimeout(() => State.cy.fit(), 50);
  if (name === 'events') requestAnimationFrame(drawBridges);
  if (name === 'settings') refreshSettingsView();
}

// ============================================================================
// Toast
// ============================================================================
function toast(msg, ms = 2800) {
  const t = $('#toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => (t.style.display = 'none'), ms);
}

// ============================================================================
// Theme
// ============================================================================
function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  if (isLight) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('em_theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
    localStorage.setItem('em_theme', 'light');
  }
}
if (localStorage.getItem('em_theme') === 'light') {
  document.documentElement.setAttribute('data-theme', 'light');
}

// ============================================================================
// Auth
// ============================================================================
async function refreshAuthStatus() {
  const s = await fetchJson('/api/auth/status');
  State.authEnabled = s.auth_enabled;
  State.authenticated = s.authenticated;
  State.sudo = s.sudo;
  State.passwordSet = s.password_set;
  return s;
}

function showLogin(setupMode) {
  $('#login-overlay').style.display = 'flex';
  $('#app').classList.remove('ready');
  $('#login-title').textContent = setupMode ? '首次设置密码' : 'Enhanced Memory';
  $('#login-sub').textContent = setupMode ? '请为 WebUI 设置管理密码（≥4 字符）' : '三轴记忆面板';
  $('#login-pw').placeholder = setupMode ? '新密码' : '管理密码';
  $('#login-pw2').style.display = setupMode ? 'block' : 'none';
  $('#login-btn').textContent = setupMode ? '设置并登录' : '登录';
  $('#login-pw').value = '';
  $('#login-pw2').value = '';
  $('#login-err').textContent = '';
  setTimeout(() => $('#login-pw').focus(), 50);
}

function hideLogin() {
  $('#login-overlay').style.display = 'none';
  $('#app').classList.add('ready');
}

async function handleLoginSubmit() {
  const pw = $('#login-pw').value;
  const pw2 = $('#login-pw2').value;
  $('#login-err').textContent = '';
  try {
    if (!State.passwordSet) {
      if (pw !== pw2) throw { body: '两次输入不一致' };
      if (pw.length < 4) throw { body: '密码至少 4 字符' };
      await fetchJson('/api/auth/setup', { method: 'POST', body: JSON.stringify({ password: pw }) });
    } else {
      await fetchJson('/api/auth/login', { method: 'POST', body: JSON.stringify({ password: pw }) });
    }
    await boot();
  } catch (e) {
    $('#login-err').textContent = e.body || '登录失败';
  }
}

async function logout() {
  await fetchJson('/api/auth/logout', { method: 'POST' }).catch(() => {});
  await refreshAuthStatus();
  showLogin(!State.passwordSet);
}

async function toggleSudo() {
  if (State.sudo) {
    await fetchJson('/api/auth/sudo/exit', { method: 'POST' }).catch(() => {});
    State.sudo = false;
    updateSudoUI(0);
    toast('已退出 Sudo');
    return;
  }
  const pw = prompt('再次输入密码以进入 Sudo 模式：');
  if (!pw) return;
  try {
    const r = await fetchJson('/api/auth/sudo', {
      method: 'POST',
      body: JSON.stringify({ password: pw }),
    });
    State.sudo = true;
    updateSudoUI(r.sudo_remaining_seconds || 1800);
    toast('已进入 Sudo 模式');
  } catch (e) {
    console.error('[sudo] 失败', e);
    const reason = e.body || (e.status === 401 ? '密码错误或会话失效' : `HTTP ${e.status || '?'}`);
    toast(`Sudo 失败：${reason}`, 4000);
  }
}

function updateSudoUI(remaining) {
  const btn = $('#btn-sudo');
  if (State.sudo && remaining > 0) {
    btn.classList.add('sudo-active');
    btn.innerHTML = `<i data-lucide="unlock" class="icon-btn-svg"></i> ${Math.floor(remaining / 60)}m`;
  } else {
    State.sudo = false;
    btn.classList.remove('sudo-active');
    btn.innerHTML = `<i data-lucide="lock" class="icon-btn-svg"></i> Sudo`;
  }
  renderIcons();
}

setInterval(async () => {
  if (!State.authenticated) return;
  const s = await refreshAuthStatus().catch(() => null);
  if (s) updateSudoUI(s.sudo_remaining_seconds || 0);
}, 30_000);

// ============================================================================
// ① Event Flow — Custom Timeline
// ============================================================================
async function reloadEventFlow() {
  let data;
  try {
    data = await fetchJson('/api/events?limit=500');
  } catch {
    $('#tl-container').innerHTML = '<div class="tl-empty error">事件流加载失败</div>';
    return;
  }
  State.rawEvents = data.items || [];
  renderTimeline(parseInt($('#event-density').value));
}

function renderTimeline(maxCount) {
  const sorted = [...State.rawEvents]
    .sort((a, b) => b.salience - a.salience)
    .slice(0, maxCount)
    .sort((a, b) => new Date(a.start) - new Date(b.start));

  const container = $('#tl-container');
  container.innerHTML = '';

  if (!sorted.length) {
    container.innerHTML = '<div class="tl-empty">暂无事件数据<br><small>在设置 → 演示数据 中注入模拟数据可预览效果</small></div>';
    return;
  }

  sorted.forEach((ev, i) => {
    const side = i % 2 === 0 ? 'left' : 'right';
    const hasParent = ev.inherit_from && ev.inherit_from.length > 0;
    const startDate = new Date(ev.start);
    const timeStr = startDate.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const tagsHtml = (ev.tags || []).slice(0, 3).map(t => `<span class="tl-badge tag">${t}</span>`).join('');

    const item = document.createElement('div');
    item.className = `tl-item ${side}`;
    item.dataset.eventId = ev.id;
    item.innerHTML = `
      <div class="tl-dot${hasParent ? ' has-parent' : ''}" data-event-id="${ev.id}" onclick="showEventDetail('${ev.id}')"></div>
      <div class="tl-card" onclick="showEventDetail('${ev.id}')">
        <div class="tl-card-header">
          <div class="tl-card-title">${ev.content}</div>
          <div class="tl-card-time">${timeStr}</div>
        </div>
        <div class="tl-card-body">
          <span class="tl-badge salience">${(ev.salience * 100).toFixed(0)}%</span>
          ${ev.group ? `<span class="tl-badge group">${ev.group.slice(0, 12)}</span>` : '<span class="tl-badge group">私聊</span>'}
          ${(ev.participants || []).length ? `<span class="tl-badge participants">${ev.participants.length} 人</span>` : ''}
          ${tagsHtml}
        </div>
      </div>`;
    container.appendChild(item);
  });

  requestAnimationFrame(drawBridges);
}

function drawBridges() {
  const container = $('#tl-container');
  if (!container) return;
  document.querySelectorAll('.tl-bridge').forEach(b => b.remove());

  State.rawEvents.forEach(ev => {
    if (!ev.inherit_from || !ev.inherit_from.length) return;
    ev.inherit_from.forEach(parentId => {
      const parentDot = container.querySelector(`.tl-dot[data-event-id="${parentId}"]`);
      const childDot  = container.querySelector(`.tl-dot[data-event-id="${ev.id}"]`);
      if (!parentDot || !childDot) return;

      const parentItem = parentDot.closest('.tl-item');
      const childItem  = childDot.closest('.tl-item');
      if (!parentItem || !childItem) return;

      const parentY = parentItem.offsetTop + parentDot.offsetTop + parentDot.offsetHeight / 2;
      const childY  = childItem.offsetTop  + childDot.offsetTop  + childDot.offsetHeight  / 2;
      const top = Math.min(parentY, childY);
      const height = Math.abs(childY - parentY);
      if (height < 4) return;

      const parentEv = State.rawEvents.find(e => e.id === parentId);
      const bridge = document.createElement('div');
      bridge.className = 'tl-bridge';
      bridge.style.top = top + 'px';
      bridge.style.height = height + 'px';
      bridge.title = `承接关系\n从：${parentEv ? parentEv.content : parentId.slice(0, 8)}\n到：${ev.content}`;
      bridge.dataset.from = parentId;
      bridge.dataset.to = ev.id;
      container.appendChild(bridge);
    });
  });
}

// Redraw bridges on resize
if (typeof ResizeObserver !== 'undefined') {
  new ResizeObserver(() => {
    if (State.currentPanel === 'events') drawBridges();
  }).observe(document.getElementById('tl-container'));
}

function highlightEvents(eventIds) {
  const idSet = new Set(eventIds);
  document.querySelectorAll('.tl-dot').forEach(dot => {
    dot.classList.toggle('highlighted', idSet.has(dot.dataset.eventId));
  });
  document.querySelectorAll('.tl-item').forEach(item => {
    const card = item.querySelector('.tl-card');
    const dot  = item.querySelector('.tl-dot');
    if (card && dot) card.classList.toggle('highlighted', idSet.has(dot.dataset.eventId));
  });
  if (eventIds.length) {
    const first = document.querySelector(`.tl-dot[data-event-id="${eventIds[0]}"]`);
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function showEventDetail(eventId) {
  const ev = State.rawEvents.find(e => e.id === eventId);
  if (!ev) return;
  const html = `
    <h3><i data-lucide="calendar-days" class="detail-title-icon"></i>事件详情</h3>
    <div class="detail-field"><span class="k">话题</span><span class="v">${ev.content}</span></div>
    <div class="detail-field"><span class="k">ID</span><span class="v">${ev.id.slice(0, 12)}…</span></div>
    <div class="detail-field"><span class="k">群组</span><span class="v">${ev.group || '私聊'}</span></div>
    <div class="detail-field"><span class="k">起始</span><span class="v">${new Date(ev.start).toLocaleString()}</span></div>
    <div class="detail-field"><span class="k">结束</span><span class="v">${new Date(ev.end).toLocaleString()}</span></div>
    <div class="detail-field"><span class="k">重要度</span><span class="v">${(ev.salience * 100).toFixed(0)}%</span></div>
    <div class="detail-field"><span class="k">参与者</span><span class="v">${(ev.participants || []).map(p => p.slice(0, 10)).join(', ') || '—'}</span></div>
    ${(ev.inherit_from || []).length ? `<div class="detail-field"><span class="k">承接自</span><span class="v">${ev.inherit_from.map(id => id.slice(0, 8)).join(', ')}</span></div>` : ''}
    <div style="margin-top:8px">${(ev.tags || []).map(t => `<span class="detail-tag">${t}</span>`).join('')}</div>`;
  showDetail(html);
}

// ============================================================================
// ② Relation Graph
// ============================================================================
async function initRelationGraph() {
  let data;
  try {
    data = await fetchJson('/api/graph');
  } catch {
    $('#cy').innerHTML = '<div class="placeholder error">关系图加载失败</div>';
    return;
  }
  State.rawGraph = data;
  renderGraph();
}

function renderGraph() {
  const { nodes, edges } = State.rawGraph;
  if (State.cy) State.cy.destroy();
  State.cy = cytoscape({
    container: $('#cy'),
    elements: [...nodes, ...edges],
    style: [
      {
        selector: 'node',
        style: {
          label: 'data(label)',
          'background-color': 'var(--accent)',
          color: 'var(--text)',
          'text-valign': 'center', 'text-halign': 'center',
          'font-size': '11px',
          width: 48, height: 48,
          'text-wrap': 'wrap', 'text-max-width': 46,
          'border-width': 1, 'border-color': 'rgba(255,255,255,0.3)',
        },
      },
      { selector: 'node[?is_bot]', style: { 'background-color': '#e91e63', 'border-width': 2 } },
      {
        selector: 'edge',
        style: {
          label: 'data(label)',
          'curve-style': 'bezier',
          'target-arrow-shape': 'triangle',
          'font-size': '9px', color: 'var(--text-dim)',
          width: 'mapData(intensity, 0, 1, 1, 5)',
          'line-color':         'mapData(affect, -1, 1, #ef4444, #22c55e)',
          'target-arrow-color': 'mapData(affect, -1, 1, #ef4444, #22c55e)',
          opacity: 0.85,
        },
      },
      { selector: '.dim', style: { opacity: 0.14 } },
      { selector: '.focused', style: { opacity: 1, 'border-width': 3, 'border-color': 'var(--warn)' } },
      { selector: 'edge.focused', style: { width: 4, opacity: 1 } },
    ],
    layout: { name: 'cose', animate: false, randomize: false, idealEdgeLength: 100 },
  });

  State.cy.on('tap', 'node', evt => {
    const node = evt.target;
    State.cy.elements().addClass('dim');
    node.closedNeighborhood().removeClass('dim').addClass('focused');
    showPersonaDetail(node.data());
  });

  State.cy.on('tap', 'edge', evt => {
    const data = evt.target.data();
    State.cy.elements().addClass('dim');
    evt.target.removeClass('dim').addClass('focused');
    evt.target.connectedNodes().removeClass('dim');
    showImpressionDetail(data);
    if (data.evidence_event_ids?.length) highlightEvents(data.evidence_event_ids);
  });

  State.cy.on('tap', evt => {
    if (evt.target === State.cy) clearHighlight();
  });

  State.cy.on('zoom', () => {
    const z = State.cy.zoom();
    State.cy.style().selector('node').style('font-size', z < 0.6 ? 0 : 11).update();
  });
}

function clearHighlight() {
  if (State.cy) State.cy.elements().removeClass('dim focused');
  highlightEvents([]);
  hideDetail();
}

function showPersonaDetail(data) {
  const attrs = data.attrs || {};
  const html = `
    <h3><i data-lucide="user-round" class="detail-title-icon"></i>${data.label}</h3>
    <div class="detail-field"><span class="k">UID</span><span class="v">${data.id.slice(0, 12)}…</span></div>
    <div class="detail-field"><span class="k">置信度</span><span class="v">${(data.confidence * 100).toFixed(0)}%</span></div>
    ${attrs.description ? `<div class="detail-field"><span class="k">描述</span><span class="v">${attrs.description}</span></div>` : ''}
    ${attrs.affect_type ? `<div class="detail-field"><span class="k">情感类型</span><span class="v">${attrs.affect_type}</span></div>` : ''}
    ${(attrs.content_tags || []).length ? `<div style="margin-top:6px">${attrs.content_tags.map(t => `<span class="detail-tag">${t}</span>`).join('')}</div>` : ''}`;
  showDetail(html);
}

function showImpressionDetail(data) {
  const affectColor = data.affect > 0 ? 'var(--positive)' : (data.affect < 0 ? 'var(--negative)' : 'var(--text-dim)');
  const html = `
    <h3><i data-lucide="link-2" class="detail-title-icon"></i>印象详情</h3>
    <div class="detail-field"><span class="k">关系类型</span><span class="v">${data.label}</span></div>
    <div class="detail-field"><span class="k">情感</span><span class="v" style="color:${affectColor}">${data.affect.toFixed(2)}</span></div>
    <div class="detail-field"><span class="k">强度</span><span class="v">${(data.intensity * 100).toFixed(0)}%</span></div>
    <div class="detail-field"><span class="k">置信度</span><span class="v">${(data.confidence * 100).toFixed(0)}%</span></div>
    <div class="detail-field"><span class="k">范围</span><span class="v">${data.scope}</span></div>
    <div class="detail-field"><span class="k">证据事件</span><span class="v">${(data.evidence_event_ids || []).length} 条</span></div>`;
  showDetail(html);
}

function showDetail(html) {
  $('#detail-content').innerHTML = html;
  $('#detail-panel').classList.add('show');
  renderIcons();
}
function hideDetail() { $('#detail-panel').classList.remove('show'); }

// ============================================================================
// ③ Summarised Memory
// ============================================================================
async function initSummaryPanel() {
  let summaries;
  try {
    summaries = await fetchJson('/api/summaries');
  } catch {
    $('#summary-list').innerHTML = '<div class="placeholder error">加载失败</div>';
    return;
  }

  const listEl = $('#summary-list');
  if (!summaries.length) {
    listEl.innerHTML = '<div class="placeholder">暂无摘要<br>运行群组摘要任务后出现</div>';
    return;
  }

  listEl.innerHTML = summaries.map(s =>
    `<div class="s-item" data-group-id="${s.group_id ?? ''}" data-date="${s.date}"
      onclick='loadSummary(${JSON.stringify(s.group_id)},${JSON.stringify(s.date)},this)'>
      <div class="s-group">${s.label}</div>
      <div class="s-date">${s.date}</div>
    </div>`
  ).join('');

  const first = listEl.querySelector('.s-item');
  if (first) loadSummary(summaries[0].group_id, summaries[0].date, first);
}

async function loadSummary(groupId, date, el) {
  document.querySelectorAll('.s-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  const qs = groupId
    ? `group_id=${encodeURIComponent(groupId)}&date=${encodeURIComponent(date)}`
    : `date=${encodeURIComponent(date)}`;
  try {
    const { content } = await fetchJson(`/api/summary?${qs}`);
    State.currentSummary = { groupId, date, content };
    if (!State.summaryEditing) {
      $('#summary-content').innerHTML = marked.parse(content);
    }
  } catch {
    $('#summary-content').innerHTML = '<div class="placeholder error">摘要加载失败</div>';
    State.currentSummary = { groupId, date, content: '' };
  }
}

function toggleSummaryEdit() {
  if (!State.sudo) { toast('修改摘要需要 Sudo 模式'); return; }
  if (!State.currentSummary.date) { toast('请先选择一条摘要'); return; }
  State.summaryEditing = true;
  $('#summary-textarea').value = State.currentSummary.content;
  $('#summary-content').style.display = 'none';
  $('#summary-editor').style.display = 'flex';
  $('#btn-edit-summary').textContent = '预览';
  $('#btn-edit-summary').onclick = cancelSummaryEdit;
}

function cancelSummaryEdit() {
  State.summaryEditing = false;
  $('#summary-editor').style.display = 'none';
  $('#summary-content').style.display = 'block';
  $('#btn-edit-summary').textContent = '编辑';
  $('#btn-edit-summary').onclick = toggleSummaryEdit;
}

async function saveSummary() {
  if (!State.sudo) { toast('需要 Sudo 模式'); return; }
  const { groupId, date } = State.currentSummary;
  const content = $('#summary-textarea').value;
  try {
    await fetchJson('/api/summary', {
      method: 'PUT',
      body: JSON.stringify({ group_id: groupId, date, content }),
    });
    State.currentSummary.content = content;
    cancelSummaryEdit();
    $('#summary-content').innerHTML = marked.parse(content);
    toast('摘要已保存');
  } catch (e) {
    toast('保存失败：' + (e.body || e.status));
  }
}

// ============================================================================
// Stats + Settings
// ============================================================================
async function refreshStats() {
  try {
    const s = await fetchJson('/api/stats');
    $('#stat-personas').textContent   = `人格 ${s.personas}`;
    $('#stat-events').textContent     = `事件 ${s.events}`;
    $('#stat-impressions').textContent = `印象 ${s.impressions}`;
    $('#app-version').textContent    = s.version;
    $('#app-version-sb').textContent = s.version;
  } catch {}
}

async function refreshSettingsView() {
  $('#auth-status-line').textContent = State.sudo
    ? '已登录 + Sudo' : (State.authenticated ? '已登录（普通模式）' : '未登录');
  try {
    const { panels } = await fetchJson('/api/panels');
    const el = $('#ext-panels-list');
    el.innerHTML = panels.length
      ? panels.map(p => `<div style="padding:4px 0">${p.icon} <b>${p.title}</b> — ${p.plugin_id}</div>`).join('')
      : '暂无第三方插件注册面板';
  } catch {}
  renderIcons();
}

async function changePassword() {
  if (!State.sudo) { toast('请先进入 Sudo 模式'); return; }
  const oldP = $('#pw-old').value, newP = $('#pw-new').value;
  if (!oldP || !newP) { toast('请填写两个字段'); return; }
  try {
    await fetchJson('/api/auth/password', {
      method: 'POST',
      body: JSON.stringify({ old_password: oldP, new_password: newP }),
    });
    toast('密码已更新，请重新登录');
    setTimeout(() => location.reload(), 1500);
  } catch (e) {
    toast(`修改失败：${e.body || e.status}`, 4000);
  }
}

async function runTask(name) {
  if (!State.sudo) { toast('需要 Sudo 模式'); return; }
  toast(`触发 ${name}…`);
  try {
    const r = await fetchJson('/api/admin/run_task', {
      method: 'POST', body: JSON.stringify({ name }),
    });
    toast(r.ok ? `${name} 已完成` : `${name} 失败`);
    setTimeout(refreshStats, 1500);
  } catch (e) {
    toast(`${name} 错误：${e.body || e.status}`, 4000);
  }
}

async function injectDemo() {
  if (!State.sudo) { toast('需要 Sudo 模式'); return; }
  toast('注入演示数据…');
  try {
    const r = await fetchJson('/api/admin/demo', { method: 'POST' });
    const s = r.seeded || {};
    toast(`注入成功：${s.personas || 0} 人格, ${s.events || 0} 事件, ${s.impressions || 0} 印象`);
    await reloadAll();
  } catch (e) {
    toast('注入失败：' + (e.body || e.status), 4000);
  }
}

// ============================================================================
// Boot
// ============================================================================
async function boot() {
  renderIcons();
  await refreshAuthStatus();
  if (State.authEnabled && !State.authenticated) {
    showLogin(!State.passwordSet);
    return;
  }
  hideLogin();
  await Promise.all([
    reloadEventFlow().catch(e => console.error('[EventFlow]', e)),
    initRelationGraph().catch(e => console.error('[RelationGraph]', e)),
    initSummaryPanel().catch(e => console.error('[SummaryPanel]', e)),
    refreshStats(),
  ]);
  updateSudoUI(0);
  renderIcons();
}

async function reloadAll() {
  await Promise.all([reloadEventFlow(), initRelationGraph(), initSummaryPanel(), refreshStats()]);
  toast('已刷新');
}

// ============================================================================
// Event bindings
// ============================================================================
$('#login-btn').addEventListener('click', handleLoginSubmit);
$('#login-pw').addEventListener('keypress', e => e.key === 'Enter' && handleLoginSubmit());
$('#login-pw2').addEventListener('keypress', e => e.key === 'Enter' && handleLoginSubmit());
$('#btn-fit').addEventListener('click', () => State.cy && State.cy.fit());
$('#btn-refresh-graph').addEventListener('click', initRelationGraph);
$('#event-density').addEventListener('input', e => {
  $('#event-density-label').textContent = e.target.value;
  renderTimeline(parseInt(e.target.value));
});

boot();
</script>
</body>
</html>
