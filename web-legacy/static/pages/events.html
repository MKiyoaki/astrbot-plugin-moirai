<div class="pv-header">
  <span class="pv-title">事件流</span>
  <div class="search-bar" style="flex:1;max-width:260px">
    <i data-lucide="search"></i>
    <input id="events-search" type="text" placeholder="搜索话题、标签、参与者…"
      oninput="filterEvents(this.value)">
  </div>
  <div class="pv-controls">
    <button id="btn-events-timeline-view" class="btn btn-ghost btn-sm active"
      onclick="setEventsView('timeline')">
      <i data-lucide="align-justify"></i> 时间线
    </button>
    <button id="btn-events-list-view" class="btn btn-ghost btn-sm"
      onclick="setEventsView('list')">
      <i data-lucide="list"></i> 列表
    </button>
    <span style="width:1px;height:16px;background:var(--panel-border);margin:0 2px"></span>
    <span style="color:var(--text-dim)">密度</span>
    <input type="range" id="event-density" min="20" max="500" value="200" step="10"
      oninput="document.getElementById('event-density-label').textContent=this.value; renderTimeline(parseInt(this.value))">
    <span id="event-density-label">200</span>
    <span style="width:1px;height:16px;background:var(--panel-border);margin:0 2px"></span>
    <button class="btn btn-ghost btn-sm" onclick="showRecycleBin()" title="回收站">
      <i data-lucide="trash-2"></i>
    </button>
    <button class="btn btn-secondary btn-sm" onclick="deleteSelectedEvents()" title="删除选中">
      <i data-lucide="circle-minus"></i>
    </button>
    <button class="btn btn-primary btn-sm" onclick="showCreateEventModal()">
      <i data-lucide="plus"></i> 新建
    </button>
    <button class="btn btn-ghost btn-sm btn-icon" onclick="reloadEventFlow()" title="刷新">
      <i data-lucide="refresh-cw"></i>
    </button>
  </div>
</div>
<div class="pv-body">
  <!-- Timeline view -->
  <div id="tl-scroll">
    <div id="tl-container">
      <div class="tl-empty">加载中…</div>
    </div>
  </div>
  <!-- Compact list view -->
  <div id="events-list-view" style="display:none">
    <div class="data-table-wrap">
      <table class="data-table" id="events-table">
        <thead>
          <tr>
            <th style="width:28px"><input type="checkbox" id="events-select-all" onclick="toggleSelectAll()"></th>
            <th>话题</th>
            <th>群组</th>
            <th>时间</th>
            <th>重要度</th>
            <th>标签</th>
            <th style="width:72px">操作</th>
          </tr>
        </thead>
        <tbody id="events-table-body"></tbody>
      </table>
    </div>
  </div>
</div>
<!-- Bridge popup (absolute-position, lives inside pv-body context) -->
<div id="bridge-popup"></div>
