<!-- ============================================================
     All CRUD modals — loaded once into #modals-container
     ============================================================ -->

<!-- Create Event Modal -->
<div id="modal-create-event" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-create-event')">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-header-title"><i data-lucide="calendar-plus"></i> 新建事件</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('modal-create-event')"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">话题 *</label>
        <input id="cev-topic" class="form-input" type="text" placeholder="事件主题">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">群组 ID</label>
          <input id="cev-group" class="form-input" type="text" placeholder="留空 = 私聊">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">开始时间</label>
          <input id="cev-start" class="form-input" type="datetime-local">
        </div>
        <div class="form-group">
          <label class="form-label">结束时间</label>
          <input id="cev-end" class="form-input" type="datetime-local">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">重要度</label>
        <div class="slider-row">
          <input id="cev-salience" type="range" min="0" max="1" step="0.01" value="0.5"
            oninput="document.getElementById('cev-salience-val').textContent=parseFloat(this.value).toFixed(2)">
          <span id="cev-salience-val" class="slider-val">0.50</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">置信度</label>
        <div class="slider-row">
          <input id="cev-confidence" type="range" min="0" max="1" step="0.01" value="0.8"
            oninput="document.getElementById('cev-confidence-val').textContent=parseFloat(this.value).toFixed(2)">
          <span id="cev-confidence-val" class="slider-val">0.80</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">标签（逗号分隔）</label>
        <input id="cev-tags" class="form-input" type="text" placeholder="音乐, 聊天, 技术">
      </div>
      <div class="form-group">
        <label class="form-label">参与者 UID（逗号分隔）</label>
        <input id="cev-participants" class="form-input" type="text" placeholder="uid_alice, uid_bob">
      </div>
      <div class="form-group">
        <label class="form-label">承接自（父事件 ID，逗号分隔）</label>
        <input id="cev-inherit" class="form-input" type="text" placeholder="可选">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-create-event')">取消</button>
      <button class="btn btn-primary" onclick="submitCreateEvent()">
        <i data-lucide="plus"></i> 创建
      </button>
    </div>
  </div>
</div>

<!-- Recycle Bin Modal -->
<div id="modal-recycle-bin" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-recycle-bin')">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-header-title"><i data-lucide="trash-2"></i> 回收站</span>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn-danger btn-sm" onclick="clearRecycleBin()">
          <i data-lucide="trash"></i> 清空
        </button>
        <button class="btn btn-ghost btn-icon" onclick="closeModal('modal-recycle-bin')"><i data-lucide="x"></i></button>
      </div>
    </div>
    <div class="modal-body" style="padding:0;gap:0">
      <div id="recycle-bin-list" style="max-height:400px;overflow-y:auto">
        <div class="placeholder">加载中…</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-recycle-bin')">关闭</button>
    </div>
  </div>
</div>

<!-- Create Persona Modal -->
<div id="modal-create-persona" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-create-persona')">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-header-title"><i data-lucide="user-plus"></i> 新建人格</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('modal-create-persona')"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">姓名 *</label>
        <input id="cp-name" class="form-input" type="text" placeholder="人格主要名称">
      </div>
      <div class="form-group">
        <label class="form-label">描述</label>
        <textarea id="cp-description" class="form-textarea" placeholder="人格描述、性格特点…"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">情感类型</label>
          <select id="cp-affect-type" class="form-select">
            <option>积极</option><option selected>中性</option><option>消极</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">置信度</label>
          <div class="slider-row">
            <input id="cp-confidence" type="range" min="0" max="1" step="0.01" value="0.8"
              oninput="document.getElementById('cp-confidence-val').textContent=parseFloat(this.value).toFixed(2)">
            <span id="cp-confidence-val" class="slider-val">0.80</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">内容标签（逗号分隔）</label>
        <input id="cp-tags" class="form-input" type="text" placeholder="音乐, 技术, 游戏">
      </div>
      <div class="form-group">
        <label class="form-label">绑定身份（每行一条 platform:physical_id）</label>
        <textarea id="cp-bindings" class="form-textarea" placeholder="qq:12345&#10;telegram:@username"></textarea>
        <span class="form-hint">格式：平台:物理ID，每行一条</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-create-persona')">取消</button>
      <button class="btn btn-primary" onclick="submitCreatePersona()">
        <i data-lucide="plus"></i> 创建
      </button>
    </div>
  </div>
</div>

<!-- Edit Impression Modal -->
<div id="modal-edit-impression" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-edit-impression')">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-header-title"><i data-lucide="link-2"></i> 编辑印象</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('modal-edit-impression')"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <input id="ei-observer" type="hidden">
      <input id="ei-subject"  type="hidden">
      <input id="ei-scope"    type="hidden">
      <div class="form-group">
        <label class="form-label">关系类型</label>
        <input id="ei-relation" class="form-input" type="text" placeholder="friend / colleague / stranger…">
      </div>
      <div class="form-group">
        <label class="form-label">情感值（-1 消极 → +1 积极）</label>
        <div class="slider-row">
          <input id="ei-affect" type="range" min="-1" max="1" step="0.01" value="0"
            oninput="const v=parseFloat(this.value); document.getElementById('ei-affect-val').textContent=(v>=0?'+':'')+v.toFixed(2)">
          <span id="ei-affect-val" class="slider-val">+0.00</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">强度</label>
        <div class="slider-row">
          <input id="ei-intensity" type="range" min="0" max="1" step="0.01" value="0.5"
            oninput="document.getElementById('ei-intensity-val').textContent=parseFloat(this.value).toFixed(2)">
          <span id="ei-intensity-val" class="slider-val">0.50</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">置信度</label>
        <div class="slider-row">
          <input id="ei-confidence" type="range" min="0" max="1" step="0.01" value="0.8"
            oninput="document.getElementById('ei-confidence-val').textContent=parseFloat(this.value).toFixed(2)">
          <span id="ei-confidence-val" class="slider-val">0.80</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">证据事件 ID（逗号分隔）</label>
        <input id="ei-evidence" class="form-input" type="text" placeholder="evt_001, evt_002">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-edit-impression')">取消</button>
      <button class="btn btn-primary" onclick="submitEditImpression()">
        <i data-lucide="save"></i> 保存
      </button>
    </div>
  </div>
</div>
